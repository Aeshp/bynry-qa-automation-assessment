name: QA Automation Suite
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        browser: [chromium, firefox, webkit]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install -r requirements.txt
      - run: playwright install --with-deps
      - run: pytest tests/ --browser ${{ matrix.browser }} -n 2
        env:
          TEST_C1_ADMIN_EMAIL: ${{ secrets.TEST_C1_ADMIN_EMAIL || 'admin@company1.com' }}
          TEST_C1_ADMIN_PASSWORD: ${{ secrets.TEST_C1_ADMIN_PASSWORD || 'password123' }}
          TEST_C1_MANAGER_EMAIL: ${{ secrets.TEST_C1_MANAGER_EMAIL || 'manager@company1.com' }}
          TEST_C1_MANAGER_PASSWORD: ${{ secrets.TEST_C1_MANAGER_PASSWORD || 'password123' }}
          TEST_C2_EMPLOYEE_EMAIL: ${{ secrets.TEST_C2_EMPLOYEE_EMAIL || 'employee@company2.com' }}
          TEST_C2_EMPLOYEE_PASSWORD: ${{ secrets.TEST_C2_EMPLOYEE_PASSWORD || 'password123' }}
          TEST_API_TOKEN: ${{ secrets.TEST_API_TOKEN || 'dummy_token' }}
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports-${{ matrix.browser }}
          path: reports/
